reference_group: female
metric_scale_sd: 1.0
iq_sd_points: 15
invariance:
  steps:
    - configural
    - metric
    - scalar
  gatekeeping:
    enabled: true
    thresholds:
      metric:
        delta_cfi_min: -0.01
        delta_rmsea_max: 0.015
        delta_srmr_max: 0.03
      scalar:
        delta_cfi_min: -0.01
        delta_rmsea_max: 0.015
        delta_srmr_max: 0.015
    near_pass_tolerance:
      metric:
        delta_cfi_excess_max: 0.002
        delta_rmsea_excess_max: 0.005
        delta_srmr_excess_max: 0.005
      scalar:
        delta_cfi_excess_max: 0.002
        delta_rmsea_excess_max: 0.005
        delta_srmr_excess_max: 0.005
    partial_policy:
      max_free_per_factor: 2
      max_free_share_per_factor: 0.2
      min_invariant_share_per_factor: 0.5
      min_free_allowance_per_factor: 2
    partial_replicability:
      enabled: true
      mode: combined
      apply_when_partial_refit: true
      min_overlap_share: 0.7
      comparison_cohorts: [nlsy79, nlsy97]
      bootstrap_replicates: 200
      bootstrap_seed: 1729
      min_bootstrap_indicator_share: 0.7
      min_bootstrap_success_reps: 100
      bootstrap_min_group_n: 50
      bootstrap_cluster_cols:
        nlsy79: []
        nlsy97: [R9708601, R9708602]
        cnlsy: []
  partial_intercepts:
    nlsy79:
      - GS~1
      - AS~1
    nlsy97:
      - PC~1
    cnlsy: []
hierarchical_factors:
  speed: ['NO', CS]
  math: [AR, MK]
  verbal: [WK, PC]
  technical: [GS, AS, MC, EI]
cnlsy_single_factor:
  - PPVT
  - PIAT_RR
  - PIAT_RC
  - PIAT_MATH
  - DIGITSPAN
reporting:
  warning_policy:
    enabled: true
    threshold: fail
  specification_stability:
    sign_stability_threshold:
      robust: 0.9
      mixed: 0.6
    se_soi:
      d_g: 0.1
      vr_g: 0.1
    se_soi_center:
      d_g: 0.0
      vr_g: 1.0
